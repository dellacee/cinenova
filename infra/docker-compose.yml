name: cinenova

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cinenova-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cinenova
      POSTGRES_PASSWORD: cinenova
      POSTGRES_DB: cinenova
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cinenova']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cinenova-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cinenova-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: cinenova
      MINIO_ROOT_PASSWORD: cinenovasecret
    command: server /data --console-address ':9001'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 10s
      retries: 3

  mailhog:
    image: mailhog/mailhog:latest
    container_name: cinenova-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  # ---------- application services (opt-in via COMPOSE_PROFILES=app) ----------
  api:
    profiles: ['app']
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    container_name: cinenova-api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://cinenova:cinenova@postgres:5432/cinenova
      DIRECT_URL: postgresql://cinenova:cinenova@postgres:5432/cinenova
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-32-bytes-minimum-please-change}
      QR_TOKEN_SECRET: ${QR_TOKEN_SECRET:-change-me-32-bytes-minimum-please-change}
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:-change-me-32-bytes-minimum-please-change}
      AI_SERVICE_URL: http://ai:5000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PAYMENT_PROVIDER: mock
    ports: ['4000:4000']

  ai:
    profiles: ['app']
    build:
      context: ..
      dockerfile: infra/docker/ai.Dockerfile
    container_name: cinenova-ai
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://cinenova:cinenova@postgres:5432/cinenova
      REDIS_URL: redis://redis:6379
      SERVICE_TOKEN_SECRET: ${SERVICE_TOKEN_SECRET:-change-me-32-bytes-minimum-please-change}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports: ['5000:5000']

  web:
    profiles: ['app']
    build:
      context: ..
      dockerfile: infra/docker/web.Dockerfile
    container_name: cinenova-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
      AUTH_SECRET: ${AUTH_SECRET:-change-me-32-bytes-minimum-please-change}
    ports: ['3000:3000']

volumes:
  postgres_data:
  redis_data:
  minio_data:
