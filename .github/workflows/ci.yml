name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-quality:
    name: Node — lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

  node-test:
    name: Node — unit tests
    runs-on: ubuntu-latest
    needs: node-quality
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cinenova
          POSTGRES_PASSWORD: cinenova
          POSTGRES_DB: cinenova_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U cinenova"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://cinenova:cinenova@localhost:5432/cinenova_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  python-quality:
    name: Python — lint & test
    runs-on: ubuntu-latest
    if: hashFiles('apps/ai/pyproject.toml') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: apps/ai
        run: uv sync --frozen

      - name: Ruff
        working-directory: apps/ai
        run: uv run ruff check .

      - name: Mypy
        working-directory: apps/ai
        run: uv run mypy app

      - name: Pytest
        working-directory: apps/ai
        run: uv run pytest -q
