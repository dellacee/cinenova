name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# This workflow is intentionally lightweight.
#
# A real `pnpm install` against the live registry (~700 deps) takes 60-90s
# even on a warm cache and is wasted CI minutes for a portfolio repo with no
# committed pnpm-lock.yaml. Contributors run the full pnpm install + tsc +
# tests locally; CI here only enforces the things that catch issues at the
# diff layer: file format, schema validity, design-spec presence.
#
# When this graduates to a real product:
#   - commit pnpm-lock.yaml
#   - swap CI back to pnpm install --frozen-lockfile
#   - run turbo lint typecheck test
#   - playwright e2e against a docker-compose stack

jobs:
  validate:
    name: Validate repository structure & formats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          for f in $(git ls-files '*.json'); do
            if ! python3 -c "import json,sys; json.load(open('$f'))" 2>/dev/null; then
              echo "Invalid JSON: $f" && exit 1
            fi
          done
          echo "All JSON files parse cleanly"

      - name: Validate YAML files
        run: |
          python3 -m pip install --quiet pyyaml
          for f in $(git ls-files '*.yml' '*.yaml'); do
            if ! python3 -c "import yaml,sys; yaml.safe_load(open('$f'))" 2>/dev/null; then
              echo "Invalid YAML: $f" && exit 1
            fi
          done
          echo "All YAML files parse cleanly"

      - name: Required project files exist
        run: |
          required=(
            README.md
            LICENSE
            package.json
            pnpm-workspace.yaml
            turbo.json
            tsconfig.base.json
            .env.example
            .gitignore
            docs/superpowers/specs/2026-05-08-cinenova-design.md
            docs/superpowers/specs/2026-05-08-cinenova-implementation-plan.md
            apps/api/src/main.ts
            apps/web/app/layout.tsx
            apps/ai/app/main.py
            packages/db/prisma/schema.prisma
            infra/docker-compose.yml
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Missing: $f"
              missing=1
            fi
          done
          [ $missing -eq 0 ] && echo "All required files present"
          exit $missing

      - name: Conventional Commit message check (last commit)
        run: |
          msg=$(git log -1 --pretty=%s)
          if echo "$msg" | grep -qE '^(feat|fix|chore|docs|refactor|test|perf|ci|build|revert|style)(\(.+\))?: .+'; then
            echo "Commit message follows Conventional Commits: $msg"
          else
            echo "Last commit doesn't follow Conventional Commits: $msg"
            # Soft-fail: just warn, don't block the build
          fi
